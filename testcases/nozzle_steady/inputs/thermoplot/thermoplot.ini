[THERMOPLOT SETTINGS]

; Diagram type - [ TS / PH ]
diagram_type = TS

; Name of the fluid whose thermodynamic diagrams are to be plotted. Name follows the CoolProp naming convention.
fluid_name = Air

; Show fluid spinodal curve - [ True / False ] - Default: False
show_spinodal = False

; show fluid isolines - [ True / False ] - Default: True
show_isolines = True

; show critical point - [ True / False ] - Default: True
show_critical_point = True

; show critical isoline - [ True / False ] - Default: True
show_critical_isoline = True

; Thermodynamic region of interest 
; Either P_range = [P_min, P_max], H_range = [H_min, H_max]
; or     S_range = [S_min, S_max], T_range = [T_min, T_max]
S_range = [3750, 3900]    
T_range = [120, 300]  
; P_range = [1e3, 1e7]
; H_range = [5e4, 5e5]

; number of points per isoline.
n_pts = 400



